<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df280",
                        "accent-red": "#ff4d88",
                        "background-light": "#f5f8f7",
                        "background-dark": "#080c0a",
                        "card-dark": "#1b2721",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(13, 242, 128, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(13, 242, 128, 0.1);
        }

        .glass-panel-expense {
            background: rgba(255, 77, 136, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 77, 136, 0.1);
        }

        .neon-glow-primary {
            text-shadow: 0 0 15px rgba(34, 197, 94, 0.4), 0 0 30px rgba(34, 197, 94, 0.2);
        }

        .neon-glow-expense {
            text-shadow: 0 0 15px rgba(239, 68, 68, 0.4), 0 0 30px rgba(239, 68, 68, 0.2);
        }

        .btn-glow-primary {
            box-shadow: 0 0 20px rgba(13, 242, 128, 0.3);
            border: 1px solid rgba(13, 242, 128, 0.5);
        }

        .btn-glow-expense {
            box-shadow: 0 0 20px rgba(255, 77, 136, 0.3);
            border: 1px solid rgba(255, 77, 136, 0.5);
        }

        .active-cat {
            border-width: 2px;
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
        }

        ::-webkit-scrollbar {
            display: none;
        }
    </style>
    <style>
        body {
            min-height: 100dvh;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 h-screen flex flex-col max-w-md mx-auto overflow-hidden">
    <!-- Top Navigation Bar & Toggle -->
    <header class="flex flex-col gap-4 p-6 pt-6 relative z-10 shrink-0">
        <div class="flex items-center justify-between">
            <a href="dashboard.html"
                class="flex items-center justify-center size-10 rounded-full bg-slate-200 dark:bg-white/5 text-slate-900 dark:text-white/80 hover:bg-white/10 transition-colors">
                <span class="material-symbols-outlined">close</span>
            </a>
            <div class="flex bg-black/40 rounded-full p-1 border border-white/10">
                <button id="btn-ingreso"
                    class="px-6 py-2 rounded-full text-sm font-bold bg-primary/20 text-primary neon-glow-primary border border-primary/30 transition-all">Ingreso</button>
                <button id="btn-egreso"
                    class="px-6 py-2 rounded-full text-sm font-bold text-slate-500 hover:text-white transition-all">Egreso</button>
            </div>
            <button
                class="flex items-center justify-center size-10 rounded-full bg-slate-200 dark:bg-white/5 text-slate-900 dark:text-white/80 hover:bg-white/10 transition-colors">
                <span class="material-symbols-outlined">history</span>
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col justify-center px-6 relative z-10 overflow-hidden">
        <!-- Amount Display -->
        <section class="flex flex-col items-center justify-center py-6 transition-all duration-700">
            <div id="glow-bg"
                class="absolute w-56 h-56 bg-primary/10 rounded-full blur-[80px] top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none transition-all duration-700">
            </div>
            <span class="text-[11px] font-black uppercase tracking-[0.5em] text-primary/40 mb-4">Monto Total</span>
            <div class="text-8xl font-black text-white flex items-center gap-1 tracking-tighter tabular-nums transition-all duration-500"
                id="amount-container">
                <span id="currency-symbol" class="text-5xl text-primary/90 mt-4">$</span>
                <span id="amount-display" class="neon-glow-primary">0</span>
                <span class="text-4xl opacity-30 mt-4">.00</span>
            </div>
        </section>
        <!-- Category Selection -->
        <section id="category-section" class="mt-8 transition-all duration-500">
            <h4 class="text-[10px] font-bold tracking-[0.2em] text-primary/40 mb-4 uppercase text-center">Select
                Category</h4>
            <div class="flex justify-center gap-4 pb-2">
                <div class="flex flex-col items-center gap-2 cursor-pointer group category-item" data-category="comida">
                    <div
                        class="size-16 rounded-full glass-panel flex items-center justify-center border-primary/50 bg-primary/20 neon-glow-primary transition-all active-cat">
                        <span class="material-symbols-outlined text-primary text-3xl">restaurant</span>
                    </div>
                    <span class="text-[11px] font-bold text-white/90 tracking-wide">Comida</span>
                </div>
                <div class="flex flex-col items-center gap-2 cursor-pointer group opacity-40 transition-all category-item"
                    data-category="techo">
                    <div
                        class="size-16 rounded-full glass-panel flex items-center justify-center hover:bg-white/5 transition-all">
                        <span class="material-symbols-outlined text-white text-3xl">home</span>
                    </div>
                    <span class="text-[11px] font-medium text-white/70">Techo</span>
                </div>
                <div class="flex flex-col items-center gap-2 cursor-pointer group opacity-40 transition-all category-item"
                    data-category="bus">
                    <div
                        class="size-16 rounded-full glass-panel flex items-center justify-center hover:bg-white/5 transition-all">
                        <span class="material-symbols-outlined text-white text-3xl">directions_bus</span>
                    </div>
                    <span class="text-[11px] font-medium text-white/70">Bus/Uber</span>
                </div>
                <div class="flex flex-col items-center gap-2 cursor-pointer group opacity-40 transition-all category-item"
                    data-category="hormiga">
                    <div
                        class="size-16 rounded-full glass-panel flex items-center justify-center hover:bg-white/5 transition-all">
                        <span class="material-symbols-outlined text-white text-3xl">local_cafe</span>
                    </div>
                    <span class="text-[11px] font-medium text-white/70">Hormiga</span>
                </div>
            </div>
        </section>
    </main>



    <!-- Custom Numeric Keypad Board -->
    <section class="px-6 pb-8 relative z-10 shrink-0">
        <div class="grid grid-cols-3 gap-4" id="numpad">
            <button
                class="aspect-[1.5/1] text-3xl font-light text-white glass-panel flex items-center justify-center rounded-2xl transition-all active:scale-90 hover:bg-white/5">1</button>
            <button
                class="aspect-[1.5/1] text-3xl font-light text-white glass-panel flex items-center justify-center rounded-2xl transition-all active:scale-90 hover:bg-white/5">2</button>
            <button
                class="aspect-[1.5/1] text-3xl font-light text-white glass-panel flex items-center justify-center rounded-2xl transition-all active:scale-90 hover:bg-white/5">3</button>
            <button
                class="aspect-[1.5/1] text-3xl font-light text-white glass-panel flex items-center justify-center rounded-2xl transition-all active:scale-90 hover:bg-white/5">4</button>
            <button
                class="aspect-[1.5/1] text-3xl font-light text-white glass-panel flex items-center justify-center rounded-2xl transition-all active:scale-90 hover:bg-white/5">5</button>
            <button
                class="aspect-[1.5/1] text-3xl font-light text-white glass-panel flex items-center justify-center rounded-2xl transition-all active:scale-90 hover:bg-white/5">6</button>
            <button
                class="aspect-[1.5/1] text-3xl font-light text-white glass-panel flex items-center justify-center rounded-2xl transition-all active:scale-90 hover:bg-white/5">7</button>
            <button
                class="aspect-[1.5/1] text-3xl font-light text-white glass-panel flex items-center justify-center rounded-2xl transition-all active:scale-90 hover:bg-white/5">8</button>
            <button
                class="aspect-[1.5/1] text-3xl font-light text-white glass-panel flex items-center justify-center rounded-2xl transition-all active:scale-90 hover:bg-white/5">9</button>
            <button
                class="aspect-[1.5/1] text-3xl font-light text-primary/80 glass-panel flex items-center justify-center rounded-2xl transition-all active:scale-90 hover:bg-white/5">.</button>
            <button
                class="aspect-[1.5/1] text-3xl font-light text-white glass-panel flex items-center justify-center rounded-2xl transition-all active:scale-90 hover:bg-white/5">0</button>
            <button id="btn-backspace"
                class="aspect-[1.5/1] flex items-center justify-center text-primary/80 glass-panel rounded-2xl transition-all active:scale-90 hover:bg-white/5">
                <span class="material-symbols-outlined text-3xl">backspace</span>
            </button>

            <!-- Save Button Integrated into the Board -->
            <button id="btn-save"
                class="col-span-3 h-20 bg-primary rounded-3xl text-background-dark font-black text-xl uppercase tracking-[0.2em] btn-glow-primary flex items-center justify-center gap-3 hover:scale-[1.02] active:scale-95 transition-all mt-2">
                <span id="save-text">Registrar Ingreso</span>
                <span class="material-symbols-outlined font-bold text-2xl">check_circle</span>
            </button>
        </div>
    </section>

    <!-- scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
    <script>
        let isIncome = true;
        let amount = "0";
        let activeCategory = "comida";

        const btnIngreso = document.getElementById('btn-ingreso');
        const btnEgreso = document.getElementById('btn-egreso');
        const amountDisplay = document.getElementById('amount-display');
        const currencySymbol = document.getElementById('currency-symbol');
        const glowBg = document.getElementById('glow-bg');
        const btnSave = document.getElementById('btn-save');
        const saveText = document.getElementById('save-text');
        const numpad = document.getElementById('numpad');
        const backspace = document.getElementById('btn-backspace');
        const categorySection = document.getElementById('category-section');
        const categoryItems = document.querySelectorAll('.category-item');

        const amountContainer = document.getElementById('amount-container');

        // Logic - UI update
        function updateUI() {
            if (isIncome) {
                btnIngreso.className = "px-6 py-2 rounded-full text-sm font-bold bg-primary/20 text-primary neon-glow-primary border border-primary/30 transition-all";
                btnEgreso.className = "px-6 py-2 rounded-full text-sm font-bold text-slate-500 hover:text-white transition-all";
                currencySymbol.className = "text-5xl text-primary/90 mt-4";
                glowBg.className = "absolute w-56 h-56 bg-primary/10 rounded-full blur-[80px] top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none transition-all";
                btnSave.className = "col-span-3 h-20 bg-primary rounded-3xl text-background-dark font-black text-xl uppercase tracking-[0.2em] btn-glow-primary flex items-center justify-center gap-3 hover:scale-[1.02] active:scale-95 transition-all mt-4";
                saveText.innerText = "Registrar Ingreso";
                categorySection.style.display = 'none';
                amountContainer.classList.remove('text-6xl');
                amountContainer.classList.add('text-9xl');
            } else {
                btnEgreso.className = "px-6 py-2 rounded-full text-sm font-bold bg-accent-red/20 text-accent-red neon-glow-expense border border-accent-red/30 transition-all";
                btnIngreso.className = "px-6 py-2 rounded-full text-sm font-bold text-slate-500 hover:text-white transition-all";
                currencySymbol.className = "text-5xl text-accent-red/90 mt-4";
                glowBg.className = "absolute w-56 h-56 bg-accent-red/10 rounded-full blur-[80px] top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none transition-all";
                btnSave.className = "col-span-3 h-20 bg-accent-red rounded-3xl text-white font-black text-xl uppercase tracking-[0.2em] btn-glow-expense flex items-center justify-center gap-3 hover:scale-[1.02] active:scale-95 transition-all mt-4";
                saveText.innerText = "Registrar Egreso";
                categorySection.style.display = 'block';
                amountContainer.classList.remove('text-9xl');
                amountContainer.classList.add('text-7xl');
            }
        }

        // Initial call to hide categories if starting as income
        updateUI();

        btnIngreso.onclick = () => { isIncome = true; updateUI(); };
        btnEgreso.onclick = () => { isIncome = false; updateUI(); };

        // Categories logic
        categoryItems.forEach(item => {
            item.onclick = () => {
                categoryItems.forEach(i => {
                    i.classList.remove('opacity-100');
                    i.classList.add('opacity-60');
                    const iconBg = i.querySelector('.glass-panel');
                    iconBg.className = "size-16 rounded-full glass-panel flex items-center justify-center group-hover:bg-white/5 transition-all";
                    const iconText = i.querySelector('span:not(.material-symbols-outlined)');
                    iconText.className = "text-xs font-medium text-white transition-all";
                    const matIcon = i.querySelector('.material-symbols-outlined');
                    matIcon.classList.remove('text-primary', 'text-accent-red');
                    matIcon.classList.add('text-white');
                });

                item.classList.remove('opacity-60');
                item.classList.add('opacity-100');
                const selectedIconBg = item.querySelector('.glass-panel');
                const selectedMatIcon = item.querySelector('.material-symbols-outlined');
                const selectedText = item.querySelector('span:not(.material-symbols-outlined)');

                selectedText.className = "text-xs font-bold text-white tracking-wide transition-all";

                if (isIncome) {
                    selectedIconBg.className = "size-16 rounded-full glass-panel flex items-center justify-center border-primary/50 bg-primary/20 neon-glow-primary transition-all active-cat";
                    selectedMatIcon.classList.remove('text-white', 'text-accent-red');
                    selectedMatIcon.classList.add('text-primary');
                } else {
                    selectedIconBg.className = "size-16 rounded-full glass-panel flex items-center justify-center border-accent-red/50 bg-accent-red/20 neon-glow-expense transition-all active-cat";
                    selectedMatIcon.classList.remove('text-white', 'text-primary');
                    selectedMatIcon.classList.add('text-accent-red');
                }

                activeCategory = item.dataset.category;
            };
        });

        // Numpad logic
        numpad.onclick = (e) => {
            if (e.target.tagName !== 'BUTTON') return;
            const val = e.target.innerText;
            if (val && val.length === 1 && !isNaN(val)) {
                if (amount === "0") amount = val;
                else if (amount.length < 9) amount += val;
                amountDisplay.innerText = new Intl.NumberFormat('en-US').format(amount);
            }
        };

        backspace.onclick = (e) => {
            e.stopPropagation();
            amount = amount.slice(0, -1);
            if (amount === "") amount = "0";
            amountDisplay.innerText = new Intl.NumberFormat('en-US').format(amount);
        };


        // Save logic
        btnSave.onclick = async () => {
            const numAmount = parseFloat(amount);
            if (numAmount <= 0) {
                alert("Ingrese un monto válido.");
                return;
            }

            const trans = {
                amount: numAmount,
                type: isIncome ? 'income' : 'expense',
                category: activeCategory,
                date: new Date().toISOString()
            };

            try {
                if (window.financeDB) {
                    await window.financeDB.addTransaction(trans);

                    // Visual feedback
                    btnSave.innerHTML = `<span class="material-symbols-outlined text-background-dark font-black">check</span>`;
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                } else {
                    console.error("LocalDB no enlazada");
                    alert("Error en DB Local");
                }
            } catch (e) {
                alert("Hubo un error al guardar: " + e);
            }
        };
    </script>
</body>

</html>
