<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df280",
                        "background-light": "#f5f8f7",
                        "background-dark": "#102219",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(13, 242, 128, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(13, 242, 128, 0.1);
        }
        .neon-glow {
            text-shadow: 0 0 15px rgba(13, 242, 128, 0.5);
        }
        .btn-glow {
            box-shadow: 0 0 20px rgba(13, 242, 128, 0.3);
        }
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col max-w-md mx-auto overflow-hidden">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between p-6 pt-12">
<button class="flex items-center justify-center size-10 rounded-full bg-slate-200 dark:bg-primary/10 text-slate-900 dark:text-primary">
<span class="material-symbols-outlined">close</span>
</button>
<h2 class="text-lg font-bold tracking-tight">New Transaction</h2>
<button class="flex items-center justify-center size-10 rounded-full bg-slate-200 dark:bg-primary/10 text-slate-900 dark:text-primary">
<span class="material-symbols-outlined">calendar_today</span>
</button>
</header>
<!-- Amount Display -->
<section class="flex flex-col items-center justify-center py-8">
<span class="text-xs font-bold uppercase tracking-widest text-primary/60 mb-2">Amount</span>
<div class="text-6xl font-extrabold text-primary neon-glow flex items-center gap-1">
<span>$</span>
<span>0.00</span>
</div>
</section>
<!-- Category Selection -->
<section class="mt-4">
<h4 class="text-[10px] font-bold tracking-[0.2em] text-primary/50 px-6 mb-4 uppercase">Select Category</h4>
<div class="flex overflow-x-auto gap-4 px-6 pb-4 no-scrollbar">
<div class="flex flex-col items-center gap-3 min-w-[72px]">
<div class="size-16 rounded-full glass-panel flex items-center justify-center border-primary/40 bg-primary/20">
<span class="material-symbols-outlined text-primary text-3xl">restaurant</span>
</div>
<span class="text-xs font-medium opacity-80">Food</span>
</div>
<div class="flex flex-col items-center gap-3 min-w-[72px]">
<div class="size-16 rounded-full glass-panel flex items-center justify-center">
<span class="material-symbols-outlined text-slate-400 text-3xl">directions_car</span>
</div>
<span class="text-xs font-medium opacity-60">Transport</span>
</div>
<div class="flex flex-col items-center gap-3 min-w-[72px]">
<div class="size-16 rounded-full glass-panel flex items-center justify-center">
<span class="material-symbols-outlined text-slate-400 text-3xl">receipt_long</span>
</div>
<span class="text-xs font-medium opacity-60">Bills</span>
</div>
<div class="flex flex-col items-center gap-3 min-w-[72px]">
<div class="size-16 rounded-full glass-panel flex items-center justify-center">
<span class="material-symbols-outlined text-slate-400 text-3xl">shopping_bag</span>
</div>
<span class="text-xs font-medium opacity-60">Shopping</span>
</div>
<div class="flex flex-col items-center gap-3 min-w-[72px]">
<div class="size-16 rounded-full glass-panel flex items-center justify-center">
<span class="material-symbols-outlined text-slate-400 text-3xl">medical_services</span>
</div>
<span class="text-xs font-medium opacity-60">Health</span>
</div>
</div>
</section>
<!-- Notes Input -->
<section class="px-6 py-4">
<div class="relative">
<input class="w-full bg-transparent border-0 border-b border-primary/20 focus:ring-0 focus:border-primary py-4 text-base placeholder:text-slate-500" placeholder="Add a note..." type="text"/>
</div>
</section>
<!-- Custom Numeric Keypad -->
<section class="flex-1 flex flex-col justify-end pb-8">
<div class="grid grid-cols-3 gap-y-2 px-8">
<button class="h-16 text-3xl font-semibold flex items-center justify-center hover:bg-primary/5 rounded-xl transition-colors">1</button>
<button class="h-16 text-3xl font-semibold flex items-center justify-center hover:bg-primary/5 rounded-xl transition-colors">2</button>
<button class="h-16 text-3xl font-semibold flex items-center justify-center hover:bg-primary/5 rounded-xl transition-colors">3</button>
<button class="h-16 text-3xl font-semibold flex items-center justify-center hover:bg-primary/5 rounded-xl transition-colors">4</button>
<button class="h-16 text-3xl font-semibold flex items-center justify-center hover:bg-primary/5 rounded-xl transition-colors">5</button>
<button class="h-16 text-3xl font-semibold flex items-center justify-center hover:bg-primary/5 rounded-xl transition-colors">6</button>
<button class="h-16 text-3xl font-semibold flex items-center justify-center hover:bg-primary/5 rounded-xl transition-colors">7</button>
<button class="h-16 text-3xl font-semibold flex items-center justify-center hover:bg-primary/5 rounded-xl transition-colors">8</button>
<button class="h-16 text-3xl font-semibold flex items-center justify-center hover:bg-primary/5 rounded-xl transition-colors">9</button>
<button class="h-16 text-3xl font-semibold flex items-center justify-center hover:bg-primary/5 rounded-xl transition-colors">.</button>
<button class="h-16 text-3xl font-semibold flex items-center justify-center hover:bg-primary/5 rounded-xl transition-colors">0</button>
<button class="h-16 text-3xl font-semibold flex items-center justify-center text-primary/60 hover:bg-primary/5 rounded-xl transition-colors">
<span class="material-symbols-outlined text-3xl">backspace</span>
</button>
</div>
</section>
<!-- CTA Button -->
<footer class="p-6 pt-0">
<button class="w-full bg-primary py-5 rounded-2xl text-background-dark font-extrabold text-lg uppercase tracking-wider btn-glow flex items-center justify-center gap-2 group">
<span>Save Transaction</span>
<span class="material-symbols-outlined font-bold">check_circle</span>
</button>
</footer>
</body></html>
